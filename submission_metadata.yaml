# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with five scoring components:
  (1) Career fitness (40%): classifies each job in career history as ML/AI,
  data-adjacent, or irrelevant; penalises entire-career-consulting firms
  (TCS/Infosys/Wipro etc.) and rewards product-company ML experience.
  This is the decisive signal against keyword stuffers — a profile listing
  "FAISS" but with a career as Project Manager at Wipro gets a 65% penalty.
  (2) Skills fitness (28%): trust-weighted skill matching using endorsements
  and duration_months as a credibility multiplier; expert skills with 0 months
  are down-weighted. Keyword stuffers are further penalised when career evidence
  is absent.
  (3) Behavioral availability (18%): composite of recency of last login,
  open_to_work_flag, recruiter_response_rate, notice_period, interview
  completion rate, and GitHub activity. A technically perfect candidate
  who is inactive and unresponsive is ranked below an equally good but
  available candidate.
  (4) Experience range (8%): 5-9 years is the JD sweet-spot.
  (5) Education + Location (4%): minor signal.
  Honeypot detection: flags profiles with expert/advanced skills at 0 duration,
  career timelines that exceed claimed experience, and impossible date sequences.
  Runtime: ~27 seconds for 100K candidates on CPU (well within 5-minute limit).

